{{- if .Site.Params.quicklink -}}
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/quicklink/3.0.1/quicklink.umd.js" integrity="sha512-ZuFPKJIIsSeG2DiU5DvfCbE9wAIM4iE4Wz0ndUgoLnSoJK+YQ9dJPzx5WWy73K0VH5QfsofoFoAXHzpp6P6xRQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
window.addEventListener('load', () => {
  quicklink.listen();
});
</script>
{{- end -}}

{{- if .HasShortcode "math" -}}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.css" integrity="sha256-o0rY/BiOj1o6986qKljXIQxskXEzWhW/8rSOvNam9bA=" crossorigin="anonymous" media="print" onload="this.media='all'; this.onload=null;">
<script src="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.js" integrity="sha256-RfvjGP6oeP3AoRGRPcH4eJSyxDk2DQIowIbvMT8hPvw=" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/contrib/auto-render.min.js" integrity="sha256-5TctGZvNrotN5x0PfOunKkuhJ3SifGCm8fd9A7MijuQ=" crossorigin="anonymous"></script>
<script>
  document.addEventListener("DOMContentLoaded", function() {
    renderMathInElement(document.body, {
      delimiters: [
        {left: "$$", right: "$$", display: true},
        {left: "$", right: "$", display: false},
        {left: "\\(", right: "\\)", display: false},
        {left: "\\[", right: "\\]", display: true}
      ]
    });
  });
</script>
{{- end -}}
